version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-apply-jobs-postgres
    environment:
      POSTGRES_USER: auto_apply_user
      POSTGRES_PASSWORD: auto_apply_dev_password
      POSTGRES_DB: auto_apply_jobs_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_apply_user -d auto_apply_jobs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto-apply-jobs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
