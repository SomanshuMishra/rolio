<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1625;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="120" fill="url(#textGradient)" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1100" cy="530" r="150" fill="url(#textGradient)" opacity="0.08" filter="url(#glow)"/>

  <!-- Logo circle -->
  <circle cx="150" cy="315" r="70" fill="none" stroke="url(#textGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="150" cy="315" r="60" fill="url(#textGradient)" opacity="0.15"/>

  <!-- Logo letter R -->
  <text x="150" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="url(#textGradient)" text-anchor="middle" dominant-baseline="middle">R</text>

  <!-- Main title -->
  <text x="350" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="bold" fill="url(#textGradient)">ROLIO</text>

  <!-- Subtitle -->
  <text x="350" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="500" fill="#e0e7ff" opacity="0.9">Land your next tech role with AI</text>

  <!-- Tagline -->
  <text x="350" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a0aec0">AI-powered job matching for tech professionals</text>

  <!-- Accent line -->
  <line x1="350" y1="450" x2="900" y2="450" stroke="url(#textGradient)" stroke-width="3" opacity="0.6"/>
</svg>
